appName: "onix-ev-charging"

log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
    # - parent_id

http:
  port: 8001
  timeout:
    read: 30
    write: 30
    idle: 30

pluginManager:
  root: /app/plugins

# OpenTelemetry (OTLP) - metrics and traces sent to OTEL collector, then to Loki/backend
plugins:
  otelsetup:
    id: otelsetup
    config:
      serviceName: "onix-ev-charging-bap"
      serviceVersion: "1.0.0"
      environment: "development"
      domain: "ev_charging"
      otlpEndpoint: "otel-collector-bap:4317"
      enableMetrics: "true"
      networkMetricsGranularity: "2min"
      networkMetricsFrequency: "4min"
      enableTracing: "true"
      enableLogs: "true"
      timeInterval: "5"
      auditFieldsConfig: "/app/config/audit-fields.yaml"


modules:
  # BAP Receiver - Receives callbacks from CDS (Phase 1) and BPPs (Phase 2+)
  # Phase 1: Receives on_search from CDS with aggregated catalog
  # Phase 2+: Receives callbacks from BPPs (on_select, on_init, on_confirm, etc.)
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      subscriberId: bap.ubc.kazam.energy
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        # registry:
        #   id: registry
        #   config:
        #     url: http://mock-registry:3030
        #     retry_max: 3
        #     retry_wait_min: 100ms
        #     retry_wait_max: 500ms
        # this is for the dedi registry
        # registry:
        #   id: dediregistry
        #   config:
        #     url: http://api.testnet.beckn.one/dedi
        #     registryName: subscribers.beckn.one
        #     retry_max: 3
        #     retry_wait_min: 100ms
        #     retry_wait_max: 500ms
        registry:
          id: dediregistry
          config:
            url: https://api.beckn.one/registry/dedi
            registryName: subscribers.beckn.one
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: bap.ubc.kazam.energy
            keyId: 76EU8TzcBV7L43CRoMWZ6JRMhVcBACZm7X9d5U134ejdTvLXhgV2KT
            signingPrivateKey: 54LR9tUyuxU7sUScPtx9NdZFNDWGpCN0W4ij1wRwq5k=
            signingPublicKey: q/cbRzpmMOAAvAM2zDcFl5AQlWmsZzoljzAfY2oSuMA=
            encrPrivateKey: 54LR9tUyuxU7sUScPtx9NdZFNDWGpCN0W4ij1wRwq5k=
            encrPublicKey: q/cbRzpmMOAAvAM2zDcFl5AQlWmsZzoljzAfY2oSuMA=
        cache:
          id: cache
          config:
            addr: redis-onix-bap:6379
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/core-v2.0.0-rc/api/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "3600"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "beckn.org,example.com,raw.githubusercontent.com"
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: /app/config/bap_receiver_routing.yaml
        middleware:
          - id: reqpreprocessor
            config:
              # contextKeys: transaction_id,message_id,parent_id
              contextKeys: transaction_id,message_id
              role: bap
      steps:
        - validateSign
        - addRoute
        - validateSchema

  # BAP Caller - Entry point for all requests from BAP
  # Phase 1: Routes search to external CDS for aggregation
  # Phase 2+: Routes other requests directly to BPP (bypasses CDS)
  # Uses bpp_uri from context for dynamic routing in Phase 2+
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      subscriberId: bap.ubc.kazam.energy
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        # registry:
        #   id: registry
        #   config:
        #     url: http://mock-registry:3030
        #     retry_max: 3
        #     retry_wait_min: 100ms
        #     retry_wait_max: 500ms
        # this is for the dedi registry
        # registry:
        #   id: dediregistry
        #   config:
        #     url: http://api.testnet.beckn.one/dedi
        #     registryName: subscribers.beckn.one
        #     retry_max: 3
        #     retry_wait_min: 100ms
        #     retry_wait_max: 500ms
        registry:
          id: dediregistry
          config:
            url: https://api.beckn.one/registry/dedi
            registryName: subscribers.beckn.one
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: bap.ubc.kazam.energy
            keyId: 76EU8TzcBV7L43CRoMWZ6JRMhVcBACZm7X9d5U134ejdTvLXhgV2KT
            signingPrivateKey: 54LR9tUyuxU7sUScPtx9NdZFNDWGpCN0W4ij1wRwq5k=
            signingPublicKey: q/cbRzpmMOAAvAM2zDcFl5AQlWmsZzoljzAfY2oSuMA=
            encrPrivateKey: 54LR9tUyuxU7sUScPtx9NdZFNDWGpCN0W4ij1wRwq5k=
            encrPublicKey: q/cbRzpmMOAAvAM2zDcFl5AQlWmsZzoljzAfY2oSuMA=
        cache:
          id: cache
          config:
            addr: redis-onix-bap:6379
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/heads/core-v2.0.0-rc/api/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "3600"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "beckn.org,example.com,raw.githubusercontent.com"
        router:
          id: router
          config:
            routingConfig: /app/config/bap_caller_routing.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              # contextKeys: transaction_id,message_id,parent_id
              contextKeys: transaction_id,message_id
              role: bap
      steps:
        - validateSchema
        - addRoute
        - sign
